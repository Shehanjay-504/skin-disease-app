<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkinDx — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0d12; --surface: #141922; --border: #252f42;
      --accent: #00d4aa; --accent2: #00a882;
      --text: #e8edf5; --text2: #8a96b0; --text3: #5a6478;
      --danger: #ff4757; --success: #2ed573;
      --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
      --radius: 12px; --radius-lg: 20px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:var(--font-body); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .auth-container { width:100%; max-width:420px; padding:2rem; }
    .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:2.5rem; }
    .auth-header { text-align:center; margin-bottom:2rem; }
    .auth-logo { font-family:var(--font-display); font-size:1.8rem; font-weight:800; margin-bottom:1rem; }
    .auth-logo span { color:var(--accent); }
    .auth-header h2 { font-family:var(--font-display); font-size:1.4rem; font-weight:700; margin-bottom:0.25rem; }
    .auth-header p { color:var(--text2); font-size:0.9rem; }
    .form-group { margin-bottom:1.25rem; }
    .form-group label { display:block; font-size:0.85rem; font-weight:500; color:var(--text2); margin-bottom:0.5rem; }
    .form-group input { width:100%; background:#111620; border:1px solid var(--border); border-radius:var(--radius); padding:0.75rem 1rem; color:var(--text); font-family:var(--font-body); font-size:0.95rem; outline:none; transition:border-color 0.2s; }
    .form-group input:focus { border-color:var(--accent); }
    .form-group input::placeholder { color:var(--text3); }
    .password-hint { font-size:0.78rem; color:var(--text3); margin-top:0.4rem; }
    .btn { display:flex; align-items:center; justify-content:center; width:100%; padding:0.8rem; border-radius:var(--radius); font-family:var(--font-body); font-size:0.95rem; font-weight:700; cursor:pointer; border:none; background:var(--accent); color:#0a0d12; transition:all 0.2s; margin-top:0.5rem; }
    .btn:hover { background:var(--accent2); box-shadow:0 8px 24px rgba(0,212,170,0.3); }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    .alert { padding:0.85rem 1rem; border-radius:var(--radius); font-size:0.88rem; margin-bottom:1.25rem; display:none; }
    .alert-error { background:rgba(255,71,87,0.12); border:1px solid rgba(255,71,87,0.3); color:#ff6b7a; }
    .alert-success { background:rgba(46,213,115,0.12); border:1px solid rgba(46,213,115,0.3); color:#2ed573; }
    .auth-switch { text-align:center; margin-top:1.5rem; color:var(--text2); font-size:0.9rem; }
    .auth-switch a { color:var(--accent); text-decoration:none; font-weight:600; }
    .strength-bar { height:4px; border-radius:100px; background:var(--border); margin-top:0.5rem; overflow:hidden; }
    .strength-fill { height:100%; border-radius:100px; transition:width 0.3s, background 0.3s; width:0; }
    .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(10,13,18,0.3); border-top-color:#0a0d12; border-radius:50%; animation:spin 0.7s linear infinite; margin-right:8px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">Skin<span>Dx</span></div>
        <h2>Create account</h2>
        <p>Start your free diagnosis today</p>
      </div>
      <div id="registerError" class="alert alert-error"></div>
      <div id="registerSuccess" class="alert alert-success"></div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="John Doe" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Min 6 characters" oninput="checkStrength(this.value)" />
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <p class="password-hint" id="strengthText">Enter a password</p>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="regConfirm" placeholder="Re-enter password" />
      </div>
      <button class="btn" onclick="register()" id="registerBtn">Create Account</button>
      <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3000';

    function checkStrength(password) {
      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');
      let strength = 0;
      if (password.length >= 6) strength++;
      if (password.length >= 10) strength++;
      if (/[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^A-Za-z0-9]/.test(password)) strength++;

      const levels = [
        { w: '0%', c: 'transparent', t: 'Enter a password' },
        { w: '25%', c: '#ff4757', t: 'Weak' },
        { w: '50%', c: '#ffa502', t: 'Fair' },
        { w: '75%', c: '#00d4aa', t: 'Good' },
        { w: '100%', c: '#2ed573', t: 'Strong' },
      ];
      const l = levels[Math.min(strength, 4)];
      fill.style.width = l.w;
      fill.style.background = l.c;
      text.textContent = l.t;
      text.style.color = l.c;
    }

    async function register() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirm').value;
      const errEl = document.getElementById('registerError');
      const sucEl = document.getElementById('registerSuccess');
      const btn = document.getElementById('registerBtn');
      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      if (!name || !email || !password || !confirm) {
        errEl.textContent = 'Please fill in all fields.';
        errEl.style.display = 'block'; return;
      }
      if (password.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters.';
        errEl.style.display = 'block'; return;
      }
      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block'; return;
      }

      btn.innerHTML = '<span class="spinner"></span> Creating account...';
      btn.disabled = true;

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || 'Registration failed.';
          errEl.style.display = 'block'; return;
        }

        sucEl.textContent = 'Account created successfully! Redirecting to login...';
        sucEl.style.display = 'block';
        setTimeout(() => window.location.href = 'login.html', 2000);

      } catch (err) {
        errEl.textContent = 'Cannot connect to server.';
        errEl.style.display = 'block';
      } finally {
        btn.innerHTML = 'Create Account';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
