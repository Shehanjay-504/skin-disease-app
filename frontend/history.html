<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkinDx — History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0d12; --bg2:#111620; --surface:#141922; --surface2:#1e2636;
      --border:#252f42; --accent:#00d4aa; --accent2:#00a882;
      --accent-glow:rgba(0,212,170,0.15); --text:#e8edf5; --text2:#8a96b0;
      --text3:#5a6478; --danger:#ff4757; --warning:#ffa502;
      --font-display:'Syne',sans-serif; --font-body:'DM Sans',sans-serif;
      --radius:12px; --radius-lg:20px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      color:var(--text);
      font-family:var(--font-body);
      min-height:100vh;
      padding-top:64px;
      position: relative;
      background-image: url('https://images.unsplash.com/photo-1576091160550-2173dba999ef?w=1920&q=80');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10, 13, 18, 0.72) 0%,
        rgba(10, 13, 18, 0.85) 60%,
        rgba(10, 13, 18, 1) 100%
      );
      z-index: 0;
      pointer-events: none;
    }

    .page-container { position:relative; z-index:1; max-width:800px; margin:0 auto; padding:3rem 2rem; }
    .page-header { margin-bottom:2rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; }
    .page-header h2 { font-family:var(--font-display); font-size:2rem; font-weight:800; }
    .page-header p { color:var(--text2); margin-top:0.25rem; }
    .btn-new { background:var(--accent); color:#0a0d12; padding:0.6rem 1.25rem; border-radius:var(--radius); text-decoration:none; font-weight:700; font-size:0.9rem; border:none; cursor:pointer; transition:all 0.2s; }
    .btn-new:hover { background:var(--accent2); }
    .filters { display:flex; gap:0.75rem; margin-bottom:1.5rem; flex-wrap:wrap; }
    .filter-btn { padding:0.4rem 1rem; border-radius:100px; border:1px solid var(--border); background:transparent; color:var(--text2); font-size:0.85rem; cursor:pointer; transition:all 0.2s; font-family:var(--font-body); }
    .filter-btn:hover, .filter-btn.active { border-color:var(--accent); color:var(--accent); background:var(--accent-glow); }
    .search-box { flex:1; min-width:200px; }
    .search-box input { width:100%; background:rgba(20,25,34,0.85); backdrop-filter:blur(8px); border:1px solid var(--border); border-radius:var(--radius); padding:0.5rem 1rem; color:var(--text); font-family:var(--font-body); font-size:0.9rem; outline:none; transition:border-color 0.2s; }
    .search-box input:focus { border-color:var(--accent); }
    .search-box input::placeholder { color:var(--text3); }
    .history-list { display:flex; flex-direction:column; gap:1rem; }

    .history-item {
      background: rgba(20, 25, 34, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:1.25rem 1.5rem;
      display:flex; align-items:center; justify-content:space-between;
      gap:1rem; flex-wrap:wrap;
      transition:border-color 0.2s, transform 0.15s;
      cursor:pointer;
    }
    .history-item:hover { border-color:var(--accent); transform:translateX(4px); }
    .history-disease { font-family:var(--font-display); font-size:1.05rem; font-weight:700; margin-bottom:0.3rem; }
    .history-meta { font-size:0.82rem; color:var(--text2); display:flex; gap:1rem; flex-wrap:wrap; }
    .history-confidence { font-family:var(--font-display); font-size:1.5rem; font-weight:700; color:var(--accent); }
    .confidence-mini { height:4px; width:80px; background:rgba(17,22,32,0.8); border-radius:100px; overflow:hidden; margin-top:0.4rem; margin-left:auto; }
    .confidence-mini-fill { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:100px; }
    .empty-state { text-align:center; padding:4rem 2rem; color:var(--text3); }
    .empty-icon { font-size:3.5rem; margin-bottom:1rem; }
    .empty-state h3 { font-family:var(--font-display); font-size:1.2rem; font-weight:700; color:var(--text2); margin-bottom:0.5rem; }
    .empty-state a { color:var(--accent); text-decoration:none; font-weight:600; }
    .loading { text-align:center; color:var(--text3); padding:3rem; }

    .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:1rem; margin-bottom:2rem; }
    .stat-mini {
      background: rgba(20, 25, 34, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:1rem; text-align:center;
    }
    .stat-mini-num { font-family:var(--font-display); font-size:1.6rem; font-weight:800; color:var(--accent); }
    .stat-mini-label { font-size:0.78rem; color:var(--text2); margin-top:0.2rem; }
    .history-meta .material-icons { font-size:14px; vertical-align:middle; margin-right:3px; color:var(--accent); }
    .empty-icon { margin-bottom:1rem; }
    .empty-icon .material-icons { font-size:3.5rem; color:var(--text3); }
    .search-icon-wrap { display:flex; align-items:center; position:relative; width:100%; }
    .search-icon-wrap .material-icons { position:absolute; left:0.75rem; font-size:18px; color:var(--text3); pointer-events:none; }
    .search-icon-wrap input { padding-left:2.5rem !important; width:100%; }
  </style>
</head>
<body>
  <script src="js/navbar.js"></script>
  <script>requireAuth();</script>

  <div class="page-container">
    <div class="page-header">
      <div>
        <h2>My Diagnoses</h2>
        <p>Your complete skin analysis history</p>
      </div>
      <a href="upload.html" class="btn-new">+ New Diagnosis</a>
    </div>

    <div class="stats-row" id="statsRow" style="display:none">
      <div class="stat-mini"><div class="stat-mini-num" id="totalScans">0</div><div class="stat-mini-label">Total Scans</div></div>
      <div class="stat-mini"><div class="stat-mini-num" id="avgConfidence">0%</div><div class="stat-mini-label">Avg Confidence</div></div>
      <div class="stat-mini"><div class="stat-mini-num" id="topDisease">—</div><div class="stat-mini-label">Most Detected</div></div>
    </div>

    <div class="filters">
      <div class="search-box">
        <div class="search-icon-wrap">
          <span class="material-icons">search</span>
          <input type="text" id="searchInput" placeholder="Search by disease..." oninput="filterHistory()" />
        </div>
      </div>
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('week', this)">This Week</button>
      <button class="filter-btn" onclick="setFilter('month', this)">This Month</button>
    </div>

    <div class="history-list" id="historyList">
      <div class="loading">Loading your history...</div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3000';
    let allHistory = [];
    let currentFilter = 'all';

    async function loadHistory() {
      const container = document.getElementById('historyList');
      try {
        const res = await fetch(`${API}/predict/history`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
        const data = await res.json();
        if (!res.ok) { container.innerHTML = `<div class="loading">${data.error}</div>`; return; }
        allHistory = data.history;
        renderStats(allHistory);
        renderHistory(allHistory);
      } catch { container.innerHTML = '<div class="loading">Failed to load. Is the server running?</div>'; }
    }

    function renderStats(history) {
      if (history.length === 0) return;
      document.getElementById('statsRow').style.display = 'grid';
      document.getElementById('totalScans').textContent = history.length;
      const avg = history.reduce((s, h) => s + parseFloat(h.confidence), 0) / history.length;
      document.getElementById('avgConfidence').textContent = (avg * 100).toFixed(0) + '%';
      const counts = {};
      history.forEach(h => counts[h.predicted_disease] = (counts[h.predicted_disease] || 0) + 1);
      const top = Object.entries(counts).sort((a,b) => b[1]-a[1])[0];
      document.getElementById('topDisease').textContent = top ? top[0].split(' ')[0] : '—';
    }

    function renderHistory(history) {
      const container = document.getElementById('historyList');
      if (history.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon"><span class="material-icons">biotech</span></div><h3>No diagnoses found</h3><p><a href="upload.html">Upload your first skin image</a> to get started.</p></div>`;
        return;
      }
      container.innerHTML = history.map(item => {
        const pct = (item.confidence * 100).toFixed(1);
        const date = new Date(item.created_at).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
        const time = new Date(item.created_at).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
        return `<div class="history-item">
          <div class="history-info">
            <div class="history-disease">${item.predicted_disease}</div>
            <div class="history-meta"><span><span class="material-icons">calendar_today</span>${date}</span><span><span class="material-icons">schedule</span>${time}</span><span>#${item.id}</span></div>
          </div>
          <div style="text-align:right">
            <div class="history-confidence">${pct}%</div>
            <div class="confidence-mini"><div class="confidence-mini-fill" style="width:${pct}%"></div></div>
          </div>
        </div>`;
      }).join('');
    }

    function filterHistory() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      let filtered = allHistory;
      if (currentFilter === 'week') { const w = new Date(); w.setDate(w.getDate()-7); filtered = filtered.filter(h => new Date(h.created_at) >= w); }
      else if (currentFilter === 'month') { const m = new Date(); m.setMonth(m.getMonth()-1); filtered = filtered.filter(h => new Date(h.created_at) >= m); }
      if (search) filtered = filtered.filter(h => h.predicted_disease.toLowerCase().includes(search));
      renderHistory(filtered);
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterHistory();
    }

    loadHistory();
  </script>
</body>
</html>
