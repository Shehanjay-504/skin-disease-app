<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkinDx — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0d12; --surface: #141922; --border: #252f42;
      --accent: #00d4aa; --accent2: #00a882; --accent-glow: rgba(0,212,170,0.15);
      --text: #e8edf5; --text2: #8a96b0; --text3: #5a6478;
      --danger: #ff4757; --success: #2ed573;
      --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
      --radius: 12px; --radius-lg: 20px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:var(--font-body); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .auth-container { width:100%; max-width:420px; padding:2rem; }
    .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:2.5rem; }
    .auth-header { text-align:center; margin-bottom:2rem; }
    .auth-logo { font-family:var(--font-display); font-size:1.8rem; font-weight:800; margin-bottom:1rem; }
    .auth-logo span { color:var(--accent); }
    .auth-header h2 { font-family:var(--font-display); font-size:1.4rem; font-weight:700; margin-bottom:0.25rem; }
    .auth-header p { color:var(--text2); font-size:0.9rem; }
    .form-group { margin-bottom:1.25rem; }
    .form-group label { display:block; font-size:0.85rem; font-weight:500; color:var(--text2); margin-bottom:0.5rem; }
    .form-group input { width:100%; background:#111620; border:1px solid var(--border); border-radius:var(--radius); padding:0.75rem 1rem; color:var(--text); font-family:var(--font-body); font-size:0.95rem; outline:none; transition:border-color 0.2s; }
    .form-group input:focus { border-color:var(--accent); }
    .form-group input::placeholder { color:var(--text3); }
    .btn { display:flex; align-items:center; justify-content:center; width:100%; padding:0.8rem; border-radius:var(--radius); font-family:var(--font-body); font-size:0.95rem; font-weight:700; cursor:pointer; border:none; background:var(--accent); color:#0a0d12; transition:all 0.2s; margin-top:0.5rem; }
    .btn:hover { background:var(--accent2); box-shadow:0 8px 24px rgba(0,212,170,0.3); }
    .alert { padding:0.85rem 1rem; border-radius:var(--radius); font-size:0.88rem; margin-bottom:1.25rem; display:none; }
    .alert-error { background:rgba(255,71,87,0.12); border:1px solid rgba(255,71,87,0.3); color:#ff6b7a; }
    .alert-success { background:rgba(46,213,115,0.12); border:1px solid rgba(46,213,115,0.3); color:#2ed573; }
    .auth-switch { text-align:center; margin-top:1.5rem; color:var(--text2); font-size:0.9rem; }
    .auth-switch a { color:var(--accent); text-decoration:none; font-weight:600; }
    .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(10,13,18,0.3); border-top-color:#0a0d12; border-radius:50%; animation:spin 0.7s linear infinite; margin-right:8px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">Skin<span>Dx</span></div>
        <h2>Welcome back</h2>
        <p>Log in to your account</p>
      </div>
      <div id="loginError" class="alert alert-error"></div>
      <div id="loginSuccess" class="alert alert-success"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()" />
      </div>
      <button class="btn" onclick="login()" id="loginBtn">Log In</button>
      <p class="auth-switch">Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3000';

    // Redirect if already logged in
    if (localStorage.getItem('skindx_token')) {
      window.location.href = 'index.html';
    }

    async function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginError');
      const sucEl = document.getElementById('loginSuccess');
      const btn = document.getElementById('loginBtn');
      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      if (!email || !password) {
        errEl.textContent = 'Please fill in all fields.';
        errEl.style.display = 'block';
        return;
      }

      btn.innerHTML = '<span class="spinner"></span> Logging in...';
      btn.disabled = true;

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || 'Login failed.';
          errEl.style.display = 'block';
          return;
        }

        // Save token and user info
        localStorage.setItem('skindx_token', data.token);
        localStorage.setItem('skindx_user', JSON.stringify(data.user));

        sucEl.textContent = 'Login successful! Redirecting...';
        sucEl.style.display = 'block';

        // Redirect based on role
        setTimeout(() => {
          if (data.user.role === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'index.html';
          }
        }, 1000);

      } catch (err) {
        errEl.textContent = 'Cannot connect to server. Make sure backend is running.';
        errEl.style.display = 'block';
      } finally {
        btn.innerHTML = 'Log In';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
